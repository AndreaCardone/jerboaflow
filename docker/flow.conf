# Compose-flavoured copy of examples/09_mqtt.conf.
# The MQTT broker is reachable by service name ("mosquitto") on the
# user-defined network created by docker-compose.

src        generator 200 20 mqtt-msg
publisher  mqtt pub mosquitto 1883 jerboa/demo
subscriber mqtt sub mosquitto 1883 jerboa/demo
out        printer recv

src        -> publisher
subscriber -> out
