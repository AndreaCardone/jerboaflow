# 05_batch.conf -- coalesce many small packets into fewer big ones.
#
# Useful for cutting per-write overhead on a sink (file/network).
# Here: gen produces 12 packets, batch groups them into 4-per-record,
# the printer writes 3 multi-line records total.
#
# Run: ./jerboa examples/05_batch.conf

gen  generator 50 12 evt
bat  batch     4
out  printer   chunk

gen -> bat
bat -> out
