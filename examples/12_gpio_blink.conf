# 12_gpio_blink.conf -- mirror a button onto an LED via GPIO.
#
#   button -> led                                  (both edges = state mirror)
#   button -> tap                                  (log every edge to stdout)
#
# Build:   make WITH_GPIO=1
# Run:     ./jerboa examples/12_gpio_blink.conf
#
# Adjust the chip and line numbers for your board. `gpiodetect` lists
# chips; `gpioinfo gpiochip0` lists lines. On a Raspberry Pi 5 the user
# header is `gpiochip4`; on a Pi 4 it is `gpiochip0`.
#
# Run as a user in the `gpio` group, or via `sudo`, so /dev/gpiochipN
# is openable.

button  gpio_in   gpiochip0 17 both
led     gpio_out  gpiochip0 27 0
tap     printer   edge

button -> led
button -> tap
