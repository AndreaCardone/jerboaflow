# 09_mqtt.conf -- round-trip every line of access.log through an MQTT broker.
#
#   src -> publisher                          (publish to jerboa/demo)
#   subscriber -> printer                     (receive from jerboa/demo)
#
# Build:   make WITH_MQTT=1
# Run a broker first (in another terminal):
#          mosquitto -v
# Then:    ./jerboa examples/09_mqtt.conf
# Stop with Ctrl-C (the subscriber is a never-ending source).

src        generator 200 20 mqtt-msg
publisher  mqtt pub localhost 1883 jerboa/demo
subscriber mqtt sub localhost 1883 jerboa/demo
out        printer recv

src        -> publisher
subscriber -> out
