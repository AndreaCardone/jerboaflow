# 03_fanout.conf -- one source, three independent sinks.
#
# Demonstrates 1->N: each generated packet is delivered to a stdout
# printer, an uppercased printer (via uppercase), and a count printer.
# All three branches run concurrently on the worker pool.
#
# Run: ./jerboa examples/03_fanout.conf

gen   generator 100 5 msg
up    uppercase
ctr   count

raw   printer raw
loud  printer loud
n     printer count

gen -> raw, up, ctr
up  -> loud
ctr -> n
