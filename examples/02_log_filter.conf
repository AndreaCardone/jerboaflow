# 02_log_filter.conf -- grep-like log processing.
#
# Reads examples/access.log line by line, keeps only lines containing
# "404", and prints them with a tag. Real-world shape: file -> filter
# -> sink (here printer; swap to `fwriter <path>` to write to disk).
#
# Run: ./jerboa examples/02_log_filter.conf

src   file    examples/access.log
flt   filter  404
out   printer 404

src -> flt
flt -> out
