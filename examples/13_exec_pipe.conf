# 13_exec_pipe.conf -- shell out to a child process per packet.
#
#   src -> hashed -> out
#
# Every 200ms `generator` emits "msg-N". The `exec` node runs
# `/bin/sh -c "sha256sum | cut -d' ' -f1"` once per packet, piping
# the payload to stdin; the captured stdout (the hex digest plus a
# newline) is forwarded downstream.
#
# Run:   ./jerboa examples/13_exec_pipe.conf
# Stop:  Ctrl-C (generator emits 5 packets then the flow terminates).

src     generator 200 5 msg
hashed  exec      sha256sum | cut -d' ' -f1
out     printer   sha256

src    -> hashed
hashed -> out
