# 17_mqtt_threefields.conf -- one MQTT message carries three fields
# (temp, hum, pressure); the lua node parses it, enriches it with a
# "tags" array, and re-emits a JSON object. That JSON is:
#   * republished to jerboa/env/alerts via an `mqtt pub` sink, and
#   * fanned out to three filter_re branches that each match one
#     quoted tag token and fire a per-field exec action.
#
# Pipeline:
#
#                                       /-- mqtt pub  -> jerboa/env/alerts
#   mqtt sub -> parse (lua) -> tee --+--- filter_re "HOT"   -> exec (temp)
#                                       +-- filter_re "HUMID" -> exec (hum)
#                                       \-- filter_re "LOWP"  -> exec (pres)
#
# Build:   make WITH_LUA=1 WITH_MQTT=1
# Broker:  mosquitto -v        (other terminal)
# Run:     ./jerboa examples/17_mqtt_threefields.conf
#
# Watch the enriched stream:
#   mosquitto_sub -h localhost -t jerboa/env/alerts -v
#
# Publish a few readings:
#
#   mosquitto_pub -h localhost -t jerboa/env \
#       -m '{"temp":31,"hum":85,"pressure":980}'   # all three tags
#   mosquitto_pub -h localhost -t jerboa/env \
#       -m '{"temp":30,"hum":40,"pressure":1015}'  # only HOT
#   mosquitto_pub -h localhost -t jerboa/env \
#       -m '{"temp":22,"hum":45,"pressure":1013}'  # nominal, no exec fires
#
# Then inspect:
#
#   tail -n+1 /tmp/jerboa_{temp,hum,pres}.log

sub      mqtt sub localhost 1883 jerboa/env
parse    lua  examples/17_mqtt_threefields.lua
fanout   tee

out      mqtt pub localhost 1883 jerboa/env/alerts

f_temp   filter_re "HOT"
f_hum    filter_re "HUMID"
f_pres   filter_re "LOWP"

a_temp   exec tee -a /tmp/jerboa_temp.log
a_hum    exec tee -a /tmp/jerboa_hum.log
a_pres   exec tee -a /tmp/jerboa_pres.log

p_temp   printer temp
p_hum    printer hum
p_pres   printer pres

sub    -> parse
parse  -> fanout
fanout -> out, f_temp, f_hum, f_pres
f_temp -> a_temp
f_hum  -> a_hum
f_pres -> a_pres
a_temp -> p_temp
a_hum  -> p_hum
a_pres -> p_pres
