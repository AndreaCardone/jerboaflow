# 15_http_out.conf -- forward each generated packet as an HTTP POST,
# then print the response body returned by the server.
#
# Bring up a quick echo server in another terminal:
#
#   python3 -c '
#   import http.server
#   class H(http.server.BaseHTTPRequestHandler):
#       def do_POST(s):
#           n = int(s.headers.get("Content-Length","0"))
#           body = s.rfile.read(n)
#           s.send_response(200)
#           s.send_header("Content-Type","text/plain")
#           s.send_header("Content-Length", str(len(body)+5))
#           s.end_headers(); s.wfile.write(b"ECHO:"+body)
#   http.server.HTTPServer(("127.0.0.1",8765),H).serve_forever()'
#
# Then run jerboa:
#
#   ./jerboa examples/15_http_out.conf
#
# You should see:
#   [echo/response in=0] ECHO:hello-0
#   [echo/response in=0] ECHO:hello-1
#   ...
#
# http_out is plain HTTP only. For TLS / auth / redirects, point the
# url at a local reverse proxy (nginx, caddy) that adds them.

src   generator 500 0 hello
post  http_out  http://127.0.0.1:8765/ingest POST text/plain
echo  printer   response

src  -> post
post -> echo
