# 06_diamond.conf -- fan-out + multi-input join in one graph.
#
#       gen ---> upper ---\
#         \---> count  ---> printer (in=0 from upper, in=1 from count)
#
# Each generated packet travels two paths (fan-out) and re-converges
# at a single printer on two distinct input ports. The printer's "in="
# tag tells you which branch each line came from. This is the canonical
# "diamond" topology and exercises every primitive at once: refcount
# fan-out, multi-port input, worker scheduling, clean shutdown.
#
# Run: ./jerboa examples/06_diamond.conf

gen    generator 100 5 pingU
upper  uppercase
ctr    count
out    printer  diamond

gen   -> upper, ctr
upper -> out:0
ctr   -> out:1
