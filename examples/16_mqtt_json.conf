# 16_mqtt_json.conf -- subscribe to MQTT, parse JSON, route on threshold,
# trigger an action (append to a log file) for alerts.
#
# Pipeline:
#
#   mqtt sub ---> classify (lua) ---> alerts (filter ALERT) -> notify (exec) -> printer
#                                |--> normal (filter OK)    -> printer
#
# The Lua node parses the JSON payload (sandboxed, no cjson required --
# see 16_mqtt_json.lua) and emits a tagged one-liner. Two `filter`
# nodes split the stream by tag; the alert branch runs `tee` per packet
# to append the line to /tmp/jerboa_alerts.log -- that is the "action".
#
# Build:  make WITH_LUA=1 WITH_MQTT=1
# Broker: mosquitto -v          (in another terminal)
# Run:    ./jerboa examples/16_mqtt_json.conf
#
# Then publish a few readings:
#
#   mosquitto_pub -h localhost -t jerboa/sensors \
#       -m '{"sensor":"kitchen","temp":28.5,"hum":40}'
#   mosquitto_pub -h localhost -t jerboa/sensors \
#       -m '{"sensor":"bedroom","temp":21.0,"hum":55}'
#   mosquitto_pub -h localhost -t jerboa/sensors \
#       -m 'garbage-not-json'
#
# Expected:
#   [alert] ALERT sensor=kitchen temp=28.5
#   [ok]    OK sensor=bedroom temp=21.0
#   (the garbage message is dropped by the lua node)
#
# And:
#   $ cat /tmp/jerboa_alerts.log
#   ALERT sensor=kitchen temp=28.5

sub       mqtt sub localhost 1883 jerboa/sensors
classify  lua  examples/16_mqtt_json.lua

alerts    filter_re ^ALERT
normal    filter_re ^OK

notify    exec tee -a /tmp/jerboa_alerts.log

log_alert printer alert
log_ok    printer ok

sub      -> classify
classify -> alerts, normal
alerts   -> notify
notify   -> log_alert
normal   -> log_ok
