# 20_sensor_merge.conf -- merge three sensor files into one JSON stream.
#
# Three file sources provide 10 rows each:
# - temperature
# - humidity
# - smoke
#
# A single Lua node buffers one FIFO per input port and emits one merged
# JSON object whenever it has one fresh reading from all three sensors.
# That means row 1 from each file becomes sample 1, row 2 becomes sample 2,
# and so on.
#
# If any sensor is above threshold, the output JSON includes:
# - "alarm": true
# - "alarm_type": "..."
#
# Build: make WITH_LUA=1
# Run:   ./jerboa examples/20_sensor_merge.conf

temp   file examples/20_temp.txt
hum    file examples/20_humidity.txt
smoke  file examples/20_smoke.txt
join   lua  examples/20_sensor_merge.lua
out    printer merged

temp  -> join:0
hum   -> join:1
smoke -> join:2
join  -> out
