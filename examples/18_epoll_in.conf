# 18_epoll_in.conf -- watch a FIFO and print every line.
#
# `epoll_in` watches any epoll(7)-friendly path -- FIFOs, char devices,
# sockets, pipes -- and emits one packet per `\n`-terminated line
# (CRLF tolerant). Regular files are not supported (epoll rejects them
# with EPERM); use inotify or a tail poller for log files.
#
# FIFOs are opened O_RDWR so external writer churn (each `echo > fifo`
# closes the writer) does not terminate the listener.
#
# Setup (in another terminal):
#   mkfifo /tmp/jerboa_in
#
# Run:
#   ./jerboa examples/18_epoll_in.conf
#
# Feed it (in a third terminal -- as many times as you like):
#   echo "hello"       > /tmp/jerboa_in
#   echo "world"       > /tmp/jerboa_in
#   printf "a\nb\nc\n" > /tmp/jerboa_in
#
# Stop with Ctrl-C, then:
#   rm /tmp/jerboa_in

src epoll_in /tmp/jerboa_in
out printer  line

src -> out
