# 08_lua.conf -- stream a log through a custom Lua uppercase.
#
# Reads examples/access.log, runs every line through examples/08_lua_score.lua
# (which extracts the HTTP status code and prefixes a running count),
# prints the result. The Lua script is stateful across calls.
#
# Build with Lua support:   make WITH_LUA=1
# Run:                      ./jerboa examples/08_lua.conf

src    file examples/access.log
score  lua  examples/08_lua_score.lua
out    printer score

src   -> score
score -> out
