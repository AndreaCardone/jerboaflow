# 07_throttle.conf -- rate-limit a fast source.
#
# Generator runs as fast as possible (interval 0). The throttle node
# forwards at most one packet every 250ms and drops the rest. Useful
# for protecting a slow sink from a burst.
#
# Run: ./jerboa examples/07_throttle.conf
# (Send Ctrl-C to stop; this example uses an infinite generator.)

gen  generator 100 0 fast
thr  throttle  1000
out  printer   slow

gen -> thr
thr -> out
