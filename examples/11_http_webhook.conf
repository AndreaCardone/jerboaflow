# 11_http_webhook.conf -- ingest HTTP POST bodies, uppercase, persist.
#
#   hook  -> upper -> tap                     (also tee to stdout for visibility)
#         \                  \
#          \> log                              (raw body straight to a file)
#
# Run:
#   ./jerboa examples/11_http_webhook.conf
#
# In another terminal, hit the endpoint:
#   curl -X POST --data-binary 'hello world' http://127.0.0.1:8089/ingest
#   curl -X POST --data-binary 'second one'  http://127.0.0.1:8089/ingest
#   curl -X POST --data-binary @./README.md  http://127.0.0.1:8089/ingest
#
# Wrong path returns 404; bodies > 1 MiB return 413; reply is always
# `204 No Content` on success (http_in is fire-and-forget).
#
# Tail the raw log to confirm delivery:
#   tail -f /tmp/jerboa_webhook.log
#
# Bind is 127.0.0.1 only. To accept from the LAN, change the address to
# 0.0.0.0 -- but only do so behind a reverse proxy that adds TLS + auth.

hook   http_in   127.0.0.1 8089 /ingest
log    fwriter   /tmp/jerboa_webhook.log
upper  uppercase
tap    printer   ingest

hook -> log
hook -> upper
upper -> tap
