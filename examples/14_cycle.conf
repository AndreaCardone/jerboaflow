# 14_cycle.conf -- a flow with a feedback cycle.
#
# Earlier versions of jerboa rejected any cyclic graph at load time.
# Cycles are now permitted. The runtime does not deadlock as long as
# the cycle contains a node that drops packets (here: `throttle`),
# so the feedback queue cannot grow unbounded.
#
# Topology (three nodes form the loop):
#
#     gen ------> [0] loop_0 (tee) --> prn
#                  ^           |
#                  |           +----------> [0] loop_1 (throttle)
#                  |                             |
#                  +-- [1] loop_2 (uppercase) <--+
#
# Flow per packet:
#   1. `gen` emits "tick-N" once per second.
#   2. `loop_0` (tee) fans the packet out to `prn` and to the cycle.
#   3. `loop_1` (throttle 2000) forwards at most one packet every 2s,
#      dropping anything that arrives sooner.
#   4. `loop_2` (uppercase, no args) uppercases the payload and feeds
#      it back into `loop_0:1`, which fans it out again.
#
# Because the throttle interval (2s) is greater than the generator
# interval (1s), every other generator packet's feedback copy is
# dropped. Expected output is an alternating pattern, e.g.:
#
#     tick-0
#     TICK-0          <- looped back, uppercased, passed by throttle
#     tick-1          <- feedback dropped by throttle
#     tick-2
#     TICK-2
#     tick-3
#     ...
#
# Lower the throttle below 1000 to see every packet looped (pairs);
# raise it well above 1000 to suppress the loop entirely.
#
# Run: ./jerboa examples/14_cycle.conf

gen     generator 1000 0 tick
loop_0  tee
loop_1  throttle  2000
loop_2  uppercase
prn     printer   stdout

gen    -> loop_0:0
loop_0 -> prn
loop_0 -> loop_1:0
loop_1 -> loop_2
loop_2 -> loop_0:1