# 04_join.conf -- M inputs into a single node.
#
# Two independent generators run at different rates and feed into the
# same printer on different input ports. The printer's "in=" tag shows
# which source each packet came from. Useful for merging two streams.
#
# Run: ./jerboa examples/04_join.conf

gA   generator 150 4 alpha
gB   generator 220 4 beta
mrg  printer merged

gA -> mrg:0
gB -> mrg:1
