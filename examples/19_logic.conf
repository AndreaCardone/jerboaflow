# 19_logic.conf -- route packets with the `logic` node.
#
# Demonstrates the three actions:
#
# - emit a literal token when a predicate is true
# - forward the original packet unchanged with `=`
# - drop the packet with `!`
#
# Input lines come from examples/19_logic.txt:
#
#   panic
#   hello
#   debug_trace
#   panic
#
# Pipeline:
#
#   src (file) -> alarm (logic == panic PAGE =) -> quiet (logic contains debug ! =) -> out
#
# Behaviour:
#
# - `panic` becomes `PAGE`
# - `hello` passes through unchanged
# - `debug_trace` is dropped
#
# Expected output:
#
#   [out/decision in=0] PAGE
#   [out/decision in=0] hello
#   [out/decision in=0] PAGE
#
# Run: ./jerboa examples/19_logic.conf

src    file   examples/19_logic.txt
alarm  logic  == panic PAGE =
quiet  logic  contains debug ! =
out    printer decision

src   -> alarm
alarm -> quiet
quiet -> out
